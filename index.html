<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>打卡</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#07C160">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="打卡">
    <link rel="apple-touch-icon" href="icon-512.svg">
    <style>
        /* ========== 设计系统 ========== */
        :root {
            --brand: #07C160;
            --brand-light: #E8F8EF;
            --text-primary: #1A1A1A;
            --text-secondary: #666666;
            --text-tertiary: #999999;
            --bg-page: #F5F5F5;
            --bg-card: #FFFFFF;
            --border: #E8E8E8;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
            --shadow-md: 0 2px 8px rgba(0,0,0,0.06);
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg-page);
            color: var(--text-primary);
            min-height: 100vh;
            padding: var(--space-lg);
            max-width: 600px;
            margin: 0 auto;
            -webkit-font-smoothing: antialiased;
        }

        /* ========== 时间区域（信息展示） ========== */
        .header {
            padding: var(--space-lg) 0;
            text-align: center;
        }

        .header-time {
            font-size: 48px;
            font-weight: 300;
            color: var(--text-primary);
            letter-spacing: 2px;
            line-height: 1.1;
        }

        .header-date {
            font-size: 14px;
            color: var(--text-tertiary);
            margin-top: var(--space-sm);
        }

        /* ========== Segmented Control ========== */
        .segmented-control {
            display: flex;
            background: var(--bg-card);
            border-radius: var(--radius-md);
            padding: var(--space-xs);
            margin-bottom: var(--space-md);
            box-shadow: var(--shadow-sm);
            gap: 2px;
        }

        .segmented-item {
            flex: 1;
            text-align: center;
            padding: 10px var(--space-sm);
            font-size: 15px;
            color: var(--text-secondary);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            background: transparent;
            font-family: var(--font);
        }

        .segmented-item:hover {
            background: var(--bg-page);
        }

        .segmented-item.active {
            background: var(--brand);
            color: white;
            font-weight: 500;
        }

        /* ========== 位置卡片 ========== */
        .location-card {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            padding: var(--space-md);
            margin-bottom: var(--space-md);
            box-shadow: var(--shadow-sm);
        }

        .location-row {
            display: flex;
            align-items: flex-start;
            gap: var(--space-sm);
        }

        .location-icon {
            color: var(--text-tertiary);
            font-size: 16px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .location-info {
            flex: 1;
            min-width: 0;
        }

        .location-text {
            font-size: 15px;
            color: var(--text-primary);
            line-height: 1.4;
            word-break: break-all;
        }

        .location-text.placeholder {
            color: var(--text-tertiary);
        }

        .location-coords {
            display: flex;
            gap: var(--space-md);
            margin-top: var(--space-sm);
            padding-top: var(--space-sm);
            border-top: 1px solid var(--border);
        }

        .location-coords span {
            font-size: 12px;
            color: var(--text-tertiary);
            font-family: 'SF Mono', 'Menlo', monospace;
        }

        .refresh-btn {
            margin-top: var(--space-sm);
            padding: var(--space-sm) 0;
            font-size: 14px;
            color: var(--brand);
            cursor: pointer;
            background: none;
            border: none;
            font-family: var(--font);
            text-align: left;
            width: 100%;
        }

        .refresh-btn:hover {
            color: #06AD56;
        }

        /* ========== 备注输入框（弱化） ========== */
        .remark-section {
            margin-bottom: var(--space-md);
        }

        .remark-input {
            width: 100%;
            padding: var(--space-md);
            font-size: 15px;
            color: var(--text-primary);
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            outline: none;
            font-family: var(--font);
            transition: border-color 0.2s;
        }

        .remark-input::placeholder {
            color: var(--text-tertiary);
        }

        .remark-input:focus {
            border-color: var(--brand);
        }

        /* ========== 核心CTA按钮 ========== */
        .checkin-btn {
            width: 100%;
            padding: 18px;
            font-size: 18px;
            font-weight: 500;
            color: white;
            background: var(--brand);
            border: none;
            border-radius: var(--radius-lg);
            cursor: pointer;
            font-family: var(--font);
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(7, 193, 96, 0.2);
            margin-bottom: var(--space-xl);
            letter-spacing: 4px;
        }

        .checkin-btn:hover {
            background: #06AD56;
            box-shadow: 0 6px 16px rgba(7, 193, 96, 0.3);
        }

        .checkin-btn:active {
            transform: scale(0.98);
        }

        .checkin-btn:disabled {
            background: #CCCCCC;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* ========== 统计区域 ========== */
        .stats-section {
            display: flex;
            background: var(--bg-card);
            border-radius: var(--radius-md);
            padding: var(--space-lg) var(--space-md);
            margin-bottom: var(--space-md);
            box-shadow: var(--shadow-sm);
        }

        .stat-item {
            flex: 1;
            text-align: center;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-tertiary);
            margin-top: var(--space-xs);
        }

        /* ========== 记录列表 ========== */
        .records-section {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
        }

        .records-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--space-md) var(--space-md);
            border-bottom: 1px solid var(--border);
        }

        .records-title {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .records-actions {
            display: flex;
            gap: var(--space-sm);
        }

        .action-btn {
            font-size: 13px;
            padding: 6px 14px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            border: none;
            font-family: var(--font);
            transition: all 0.2s;
        }

        .export-btn {
            background: var(--brand-light);
            color: var(--brand);
        }

        .export-btn:hover {
            background: #D0F0E0;
        }

        .clear-btn {
            background: #FFF0F0;
            color: #E04042;
        }

        .clear-btn:hover {
            background: #FFE0E0;
        }

        /* 记录项 */
        .record-item {
            display: flex;
            align-items: center;
            padding: var(--space-md);
            border-bottom: 1px solid var(--border);
            gap: var(--space-md);
        }

        .record-item:last-child {
            border-bottom: none;
        }

        .record-type {
            font-size: 13px;
            font-weight: 500;
            padding: 4px 12px;
            border-radius: var(--radius-sm);
            white-space: nowrap;
        }

        .type-work {
            background: #E6F7FF;
            color: #1890FF;
        }

        .type-off {
            background: #FFF7E6;
            color: #FA8C16;
        }

        .type-out {
            background: #F6FFED;
            color: #52C41A;
        }

        .type-back {
            background: #FFF0F6;
            color: #EB2F96;
        }

        .record-info {
            flex: 1;
            min-width: 0;
        }

        .record-time {
            font-size: 15px;
            color: var(--text-primary);
            font-weight: 500;
        }

        .record-address {
            font-size: 13px;
            color: var(--text-tertiary);
            margin-top: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .record-remark {
            font-size: 12px;
            color: var(--brand);
            margin-top: 4px;
        }

        .delete-btn {
            font-size: 18px;
            color: var(--text-tertiary);
            cursor: pointer;
            background: none;
            border: none;
            padding: var(--space-xs);
            font-family: var(--font);
            transition: color 0.2s;
        }

        .delete-btn:hover {
            color: #E04042;
        }

        .no-records {
            text-align: center;
            padding: var(--space-xl) var(--space-md);
            color: var(--text-tertiary);
            font-size: 14px;
        }

        /* ========== Toast ========== */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.75);
            color: white;
            padding: var(--space-md) var(--space-lg);
            border-radius: var(--radius-md);
            font-size: 15px;
            z-index: 1000;
            animation: fadeInOut 2s ease-in-out;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            15% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            85% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
        }

        /* ========== 模态框 ========== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1001;
            justify-content: center;
            align-items: center;
            padding: var(--space-lg);
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            padding: var(--space-xl);
            border-radius: var(--radius-lg);
            max-width: 400px;
            width: 100%;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: var(--space-md);
            color: var(--text-primary);
        }

        .modal-text {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: var(--space-xl);
            line-height: 1.5;
        }

        .modal-buttons {
            display: flex;
            gap: var(--space-md);
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 10px 24px;
            border-radius: var(--radius-sm);
            font-size: 15px;
            cursor: pointer;
            border: none;
            font-family: var(--font);
            transition: all 0.2s;
        }

        .modal-btn.cancel {
            background: var(--bg-page);
            color: var(--text-secondary);
        }

        .modal-btn.cancel:hover {
            background: var(--border);
        }

        .modal-btn.confirm {
            background: var(--brand);
            color: white;
        }

        .modal-btn.confirm:hover {
            background: #06AD56;
        }

        .modal-btn.danger {
            background: #E04042;
            color: white;
        }

        .modal-btn.danger:hover {
            background: #C03032;
        }
    </style>
</head>
<body>
    <!-- 时间区域（简化为信息展示） -->
    <div class="header">
        <div class="header-time" id="currentTime">00:00:00</div>
        <div class="header-date" id="currentDate">2026-05-09 周六</div>
    </div>

    <!-- Segmented Control（取代四个独立按钮） -->
    <div class="segmented-control">
        <button class="segmented-item active" data-type="上班" onclick="selectType(this)">上班</button>
        <button class="segmented-item" data-type="下班" onclick="selectType(this)">下班</button>
        <button class="segmented-item" data-type="外出" onclick="selectType(this)">外出</button>
        <button class="segmented-item" data-type="返回" onclick="selectType(this)">返回</button>
    </div>

    <!-- 位置卡片（简化） -->
    <div class="location-card">
        <div class="location-row">
            <span class="location-icon">📍</span>
            <div class="location-info">
                <div class="location-text placeholder" id="locationAddress">正在获取位置...</div>
                <div class="location-coords" id="locationCoords" style="display: none;">
                    <span id="latitude">纬度: --</span>
                    <span id="longitude">经度: --</span>
                </div>
            </div>
        </div>
        <button class="refresh-btn" onclick="getLocation()">刷新定位</button>
    </div>

    <!-- 备注输入框（弱化） -->
    <div class="remark-section">
        <input type="text" class="remark-input" id="remark" placeholder="添加备注（可选）" maxlength="100">
    </div>

    <!-- 核心CTA（唯一的打卡按钮） -->
    <button class="checkin-btn" id="checkinBtn" onclick="doCheckin()">打 卡</button>

    <!-- 统计区域 -->
    <div class="stats-section">
        <div class="stat-item">
            <div class="stat-number" id="todayCount">0</div>
            <div class="stat-label">今日</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="weekCount">0</div>
            <div class="stat-label">本周</div>
        </div>
    </div>

    <!-- 记录列表 -->
    <div class="records-section">
        <div class="records-header">
            <span class="records-title">打卡记录</span>
            <div class="records-actions">
                <button class="action-btn export-btn" onclick="exportRecords()">导出</button>
                <button class="action-btn clear-btn" onclick="clearRecords()">清空</button>
            </div>
        </div>

        <div id="recordsList">
            <div class="no-records">暂无打卡记录</div>
        </div>
    </div>

    <!-- 模态框 -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">确认操作</div>
            <div class="modal-text" id="modalText">确定要执行此操作吗？</div>
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="closeModal()">取消</button>
                <button class="modal-btn confirm" id="modalConfirmBtn" onclick="confirmModal()">确定</button>
            </div>
        </div>
    </div>

    <script>
        // 配置
        const CONFIG = {
            qqMapKey: 'HKXBZ-LJZ6Q-YVP5G-4IX36-5QR36-N4BYG',
            checkinTypes: ['上班', '下班', '外出', '返回']
        };

        // 全局变量
        let currentCheckinType = '上班';
        let currentLatitude = null;
        let currentLongitude = null;
        let canCheckin = false;
        let modalCallback = null;

        // 初始化
        window.onload = function() {
            updateTime();
            loadRecords();
            setInterval(updateTime, 1000);
            getLocation();
        };

        // 更新时间
        function updateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const weekDays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            const weekDay = weekDays[now.getDay()];
            
            document.getElementById('currentTime').textContent = `${hours}:${minutes}:${seconds}`;
            document.getElementById('currentDate').textContent = `${year}-${month}-${day} ${weekDay}`;
        }

        // 选择打卡类型（Segmented Control）
        function selectType(element) {
            document.querySelectorAll('.segmented-item').forEach(item => {
                item.classList.remove('active');
            });
            element.classList.add('active');
            currentCheckinType = element.dataset.type;
        }

        // 获取位置
        function getLocation() {
            if (!navigator.geolocation) {
                showToast('浏览器不支持定位');
                return;
            }

            document.getElementById('locationAddress').textContent = '正在获取位置...';
            document.getElementById('locationAddress').classList.add('placeholder');
            
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    currentLatitude = position.coords.latitude.toFixed(6);
                    currentLongitude = position.coords.longitude.toFixed(6);
                    canCheckin = true;
                    
                    document.getElementById('latitude').textContent = `纬度: ${currentLatitude}`;
                    document.getElementById('longitude').textContent = `经度: ${currentLongitude}`;
                    document.getElementById('locationCoords').style.display = 'flex';
                    
                    reverseGeocoder(currentLatitude, currentLongitude);
                    document.getElementById('checkinBtn').disabled = false;
                },
                (error) => {
                    console.error('获取位置失败:', error);
                    canCheckin = false;
                    
                    let errorMsg = '获取位置失败：';
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            errorMsg += '请允许定位权限';
                            break;
                        case error.POSITION_UNAVAILABLE:
                            errorMsg += '位置信息不可用';
                            break;
                        case error.TIMEOUT:
                            errorMsg += '获取超时';
                            break;
                        default:
                            errorMsg += '未知错误';
                    }
                    
                    document.getElementById('locationAddress').textContent = errorMsg;
                    showToast('请允许定位权限');
                },
                {
                    enableHighAccuracy: true,
                    timeout: 30000,
                    maximumAge: 0
                }
            );
        }

        // 逆地址解析（JSONP方式，解决跨域）
        function reverseGeocoder(latitude, longitude) {
            const key = CONFIG.qqMapKey;

            if (!key) {
                document.getElementById('locationAddress').textContent =
                    `${parseFloat(latitude).toFixed(6)}, ${parseFloat(longitude).toFixed(6)}`;
                document.getElementById('locationAddress').classList.remove('placeholder');
                return;
            }

            const callbackName = 'qqMapCallback_' + Date.now();
            const script = document.createElement('script');

            // 优先使用POI名称，更精确（比如"XX小区"、"XX大厦"）
            window[callbackName] = function(data) {
                delete window[callbackName];
                document.head.removeChild(script);

                if (data.status === 0) {
                    const result = data.result;
                    // POI列表通常有最精确的位置描述
                    let address = '';
                    if (result.pois && result.pois.length > 0) {
                        address = result.pois[0].title + '（' + result.pois[0].address + '）';
                    } else if (result.formatted_addresses && result.formatted_addresses.recommend) {
                        address = result.formatted_addresses.recommend;
                    } else {
                        address = result.address;
                    }
                    document.getElementById('locationAddress').textContent = address;
                    document.getElementById('locationAddress').classList.remove('placeholder');
                } else {
                    document.getElementById('locationAddress').textContent =
                        `${parseFloat(latitude).toFixed(6)}, ${parseFloat(longitude).toFixed(6)}`;
                    document.getElementById('locationAddress').classList.remove('placeholder');
                }
            };

            // get_poi=1 会返回周边POI，让地址更精确
            script.src = `https://apis.map.qq.com/ws/geocoder/v1/?location=${latitude},${longitude}&key=${key}&get_poi=1&output=jsonp&callback=${callbackName}`;
            script.onerror = function() {
                delete window[callbackName];
                document.getElementById('locationAddress').textContent =
                    `${parseFloat(latitude).toFixed(6)}, ${parseFloat(longitude).toFixed(6)}`;
                document.getElementById('locationAddress').classList.remove('placeholder');
            };
            document.head.appendChild(script);
        }

        // 执行打卡
        function doCheckin() {
            if (!canCheckin) {
                showToast('请先获取位置');
                return;
            }

            const now = new Date();
            const remark = document.getElementById('remark').value.trim();
            
            const record = {
                id: Date.now(),
                type: currentCheckinType,
                time: formatTime(now),
                timestamp: now.getTime(),
                latitude: currentLatitude,
                longitude: currentLongitude,
                address: document.getElementById('locationAddress').textContent,
                remark: remark
            };

            let records = JSON.parse(localStorage.getItem('checkinRecords') || '[]');
            records.unshift(record);
            localStorage.setItem('checkinRecords', JSON.stringify(records.slice(0, 50)));

            document.getElementById('remark').value = '';
            loadRecords();
            showToast('打卡成功');
            
            if (navigator.vibrate) {
                navigator.vibrate(100);
            }
        }

        // 格式化时间
        function formatTime(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            
            return `${year}-${month}-${day} ${hours}:${minutes}`;
        }

        // 加载记录
        function loadRecords() {
            const records = JSON.parse(localStorage.getItem('checkinRecords') || '[]');
            const recordsList = document.getElementById('recordsList');
            
            if (records.length === 0) {
                recordsList.innerHTML = '<div class="no-records">暂无打卡记录</div>';
            } else {
                let html = '';
                records.forEach(record => {
                    const typeClass = getRecordTypeClass(record.type);
                    html += `
                        <div class="record-item">
                            <div class="record-type ${typeClass}">${record.type}</div>
                            <div class="record-info">
                                <div class="record-time">${record.time}</div>
                                <div class="record-address">${record.address}</div>
                                ${record.remark ? `<div class="record-remark">备注: ${record.remark}</div>` : ''}
                            </div>
                            <button class="delete-btn" onclick="deleteRecord(${record.id})">×</button>
                        </div>
                    `;
                });
                recordsList.innerHTML = html;
            }
            
            calculateStats();
        }

        // 获取记录类型样式
        function getRecordTypeClass(type) {
            switch(type) {
                case '上班': return 'type-work';
                case '下班': return 'type-off';
                case '外出': return 'type-out';
                case '返回': return 'type-back';
                default: return 'type-work';
            }
        }

        // 计算统计
        function calculateStats() {
            const records = JSON.parse(localStorage.getItem('checkinRecords') || '[]');
            const now = new Date();
            
            const todayStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
            const todayCount = records.filter(r => r.time.startsWith(todayStr)).length;
            
            const weekStart = new Date(now);
            weekStart.setDate(now.getDate() - now.getDay());
            weekStart.setHours(0, 0, 0, 0);
            const weekCount = records.filter(r => r.timestamp >= weekStart.getTime()).length;
            
            document.getElementById('todayCount').textContent = todayCount;
            document.getElementById('weekCount').textContent = weekCount;
        }

        // 删除记录
        function deleteRecord(id) {
            showModal('确认删除', '确定要删除这条打卡记录吗？', () => {
                let records = JSON.parse(localStorage.getItem('checkinRecords') || '[]');
                records = records.filter(r => r.id !== id);
                localStorage.setItem('checkinRecords', JSON.stringify(records));
                loadRecords();
                showToast('已删除');
            });
        }

        // 清空记录
        function clearRecords() {
            showModal('确认清空', '确定要清空所有打卡记录吗？此操作不可恢复。', () => {
                localStorage.setItem('checkinRecords', JSON.stringify([]));
                loadRecords();
                showToast('已清空');
            }, true);
        }

        // 导出记录
        function exportRecords() {
            const records = JSON.parse(localStorage.getItem('checkinRecords') || '[]');
            
            if (records.length === 0) {
                showToast('暂无记录可导出');
                return;
            }

            let csv = '打卡类型,时间,地址,备注,纬度,经度\n';
            records.forEach(r => {
                csv += `${r.type},${r.time},"${r.address}",${r.remark || ''},${r.latitude},${r.longitude}\n`;
            });

            const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `打卡记录_${formatTime(new Date()).replace(/[: ]/g, '_')}.csv`;
            link.click();
            URL.revokeObjectURL(url);
            
            showToast('导出成功');
        }

        // Toast提示
        function showToast(message) {
            const existingToast = document.querySelector('.toast');
            if (existingToast) {
                existingToast.remove();
            }

            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 2000);
        }

        // 模态框
        function showModal(title, text, callback, isDanger = false) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalText').textContent = text;
            
            const confirmBtn = document.getElementById('modalConfirmBtn');
            confirmBtn.className = isDanger ? 'modal-btn danger' : 'modal-btn confirm';
            
            modalCallback = callback;
            document.getElementById('modal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('show');
            modalCallback = null;
        }

        function confirmModal() {
            if (modalCallback) {
                modalCallback();
            }
            closeModal();
        }

        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>
</body>
</html>
