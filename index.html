<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>打卡助手 - WEB版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f6f6f6;
            color: #333;
            min-height: 100vh;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        /* 时间显示区域 */
        .time-section {
            text-align: center;
            padding: 40px 20px;
            background: white;
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
        }

        .current-time {
            font-size: 72px;
            font-weight: 300;
            color: #333;
            letter-spacing: 4px;
        }

        .current-date {
            font-size: 16px;
            color: #888;
            margin-top: 10px;
        }

        /* 打卡类型选择 */
        .type-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 30px;
            background: white;
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
        }

        .type-item {
            padding: 16px;
            border-radius: 40px;
            font-size: 18px;
            background: #f5f5f5;
            color: #666;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .type-item:hover {
            background: #e8e8e8;
        }

        .type-item.active {
            background: #07c160;
            color: white;
            font-weight: 500;
            border-color: #07c160;
        }

        /* 定位信息区域 */
        .location-section {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
        }

        .location-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            gap: 10px;
        }

        .location-icon {
            font-size: 24px;
        }

        .location-text {
            font-size: 16px;
            color: #333;
            flex: 1;
        }

        .location-coords {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #999;
            margin-bottom: 20px;
            padding: 10px 0;
        }

        .refresh-btn {
            text-align: center;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 8px;
            font-size: 16px;
            color: #07c160;
            cursor: pointer;
            transition: all 0.3s;
        }

        .refresh-btn:hover {
            background: #e8e8e8;
        }

        /* 备注输入框 */
        .remark-section {
            background: white;
            border-radius: 16px;
            padding: 20px 30px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
        }

        .remark-input {
            width: 100%;
            font-size: 16px;
            color: #333;
            border: none;
            outline: none;
            padding: 10px 0;
        }

        /* 打卡按钮 */
        .checkin-btn {
            background: #07c160;
            color: white;
            text-align: center;
            padding: 20px;
            border-radius: 16px;
            font-size: 24px;
            font-weight: 500;
            letter-spacing: 8px;
            margin-bottom: 20px;
            box-shadow: 0 4px 16px rgba(7, 193, 96, 0.3);
            transition: all 0.3s;
            cursor: pointer;
            border: none;
            width: 100%;
        }

        .checkin-btn:hover {
            transform: scale(0.98);
            box-shadow: 0 2px 8px rgba(7, 193, 96, 0.3);
        }

        .checkin-btn:disabled {
            background: #ccc;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* 统计信息 */
        .stats-section {
            display: flex;
            justify-content: space-around;
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-number {
            font-size: 48px;
            font-weight: bold;
            color: #07c160;
        }

        .stat-label {
            font-size: 14px;
            color: #999;
            margin-top: 8px;
        }

        /* 打卡记录列表 */
        .records-section {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
        }

        .records-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #f0f0f0;
        }

        .records-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
        }

        .records-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            font-size: 14px;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            color: white;
        }

        .export-btn {
            background: #07c160;
        }

        .export-btn:hover {
            background: #06ad56;
        }

        .clear-btn {
            background: #ff4d4f;
        }

        .clear-btn:hover {
            background: #e04042;
        }

        /* 记录项 */
        .record-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #f5f5f5;
        }

        .record-item:last-child {
            border-bottom: none;
        }

        .record-left {
            display: flex;
            align-items: center;
            flex: 1;
            gap: 15px;
        }

        .record-type {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            min-width: 60px;
            text-align: center;
        }

        .type-work {
            background: #e6f7ff;
            color: #1890ff;
        }

        .type-off {
            background: #fff7e6;
            color: #fa8c16;
        }

        .type-out {
            background: #f6ffed;
            color: #52c41a;
        }

        .type-back {
            background: #fff0f6;
            color: #eb2f96;
        }

        .record-info {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .record-time {
            font-size: 16px;
            color: #333;
            font-weight: 500;
        }

        .record-address {
            font-size: 14px;
            color: #999;
            margin-top: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 300px;
        }

        .record-remark {
            font-size: 12px;
            color: #07c160;
            margin-top: 6px;
        }

        .record-right {
            padding-left: 20px;
        }

        .delete-btn {
            font-size: 24px;
            color: #ccc;
            cursor: pointer;
            padding: 5px 10px;
            transition: all 0.3s;
            background: none;
            border: none;
        }

        .delete-btn:hover {
            color: #ff4d4f;
        }

        /* 无记录提示 */
        .no-records {
            text-align: center;
            padding: 60px 0;
            color: #999;
            font-size: 16px;
        }

        /* Toast提示 */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            z-index: 1000;
            animation: fadeInOut 2s ease-in-out;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1001;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 16px;
            max-width: 400px;
            width: 90%;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .modal-text {
            font-size: 16px;
            color: #666;
            margin-bottom: 25px;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
        }

        .modal-btn.cancel {
            background: #f5f5f5;
            color: #666;
        }

        .modal-btn.cancel:hover {
            background: #e8e8e8;
        }

        .modal-btn.confirm {
            background: #07c160;
            color: white;
        }

        .modal-btn.confirm:hover {
            background: #06ad56;
        }

        .modal-btn.danger {
            background: #ff4d4f;
            color: white;
        }

        .modal-btn.danger:hover {
            background: #e04042;
        }
    </style>
</head>
<body>
    <!-- 时间显示区域 -->
    <div class="time-section">
        <div class="current-time" id="currentTime">00:00:00</div>
        <div class="current-date" id="currentDate">2026-05-09 周六</div>
    </div>

    <!-- 打卡类型选择 -->
    <div class="type-section">
        <div class="type-item active" data-type="上班" onclick="selectType(this)">上班</div>
        <div class="type-item" data-type="下班" onclick="selectType(this)">下班</div>
        <div class="type-item" data-type="外出" onclick="selectType(this)">外出</div>
        <div class="type-item" data-type="返回" onclick="selectType(this)">返回</div>
    </div>

    <!-- 定位信息区域 -->
    <div class="location-section">
        <div class="location-header">
            <span class="location-icon">📍</span>
            <span class="location-text" id="locationAddress">正在获取位置...</span>
        </div>
        <div class="location-coords" id="locationCoords" style="display: none;">
            <span id="latitude">纬度: --</span>
            <span id="longitude">经度: --</span>
        </div>
        <div class="refresh-btn" onclick="getLocation()">刷新定位</div>
    </div>

    <!-- 备注输入框 -->
    <div class="remark-section">
        <input type="text" class="remark-input" id="remark" placeholder="添加备注（可选）" maxlength="100">
    </div>

    <!-- 打卡按钮 -->
    <button class="checkin-btn" id="checkinBtn" onclick="doCheckin()">打 卡</button>

    <!-- 统计信息 -->
    <div class="stats-section">
        <div class="stat-item">
            <span class="stat-number" id="todayCount">0</span>
            <span class="stat-label">今日</span>
        </div>
        <div class="stat-item">
            <span class="stat-number" id="weekCount">0</span>
            <span class="stat-label">本周</span>
        </div>
    </div>

    <!-- 打卡记录列表 -->
    <div class="records-section">
        <div class="records-header">
            <span class="records-title">打卡记录</span>
            <div class="records-actions">
                <button class="action-btn export-btn" onclick="exportRecords()">导出</button>
                <button class="action-btn clear-btn" onclick="clearRecords()">清空</button>
            </div>
        </div>

        <div id="recordsList">
            <div class="no-records">暂无打卡记录</div>
        </div>
    </div>

    <!-- 模态框 -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">确认操作</div>
            <div class="modal-text" id="modalText">确定要执行此操作吗？</div>
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="closeModal()">取消</button>
                <button class="modal-btn confirm" id="modalConfirmBtn" onclick="confirmModal()">确定</button>
            </div>
        </div>
    </div>

    <script>
        // 配置
        const CONFIG = {
            // 腾讯位置服务Key（可选，不配置则显示经纬度）
            qqMapKey: 'HXBZ-LJZ6Q-YVP5G-4IX36-5QR36-N4BYG', // 腾讯位置服务Key
            
            // 打卡类型
            checkinTypes: ['上班', '下班', '外出', '返回']
        };

        // 全局变量
        let currentCheckinType = '上班';
        let currentLatitude = null;
        let currentLongitude = null;
        let canCheckin = false;
        let modalCallback = null;

        // 初始化
        window.onload = function() {
            updateTime();
            loadRecords();
            
            // 每秒更新时间
            setInterval(updateTime, 1000);
            
            // 获取位置
            getLocation();
        };

        // 更新时间显示
        function updateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const weekDays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            const weekDay = weekDays[now.getDay()];
            
            document.getElementById('currentTime').textContent = `${hours}:${minutes}:${seconds}`;
            document.getElementById('currentDate').textContent = `${year}-${month}-${day} ${weekDay}`;
        }

        // 选择打卡类型
        function selectType(element) {
            // 移除所有active类
            document.querySelectorAll('.type-item').forEach(item => {
                item.classList.remove('active');
            });
            
            // 添加active类到当前元素
            element.classList.add('active');
            currentCheckinType = element.dataset.type;
        }

        // 获取位置
        function getLocation() {
            if (!navigator.geolocation) {
                showToast('您的浏览器不支持定位功能');
                document.getElementById('locationAddress').textContent = '浏览器不支持定位';
                return;
            }

            document.getElementById('locationAddress').textContent = '正在获取位置...';
            
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    currentLatitude = position.coords.latitude.toFixed(6);
                    currentLongitude = position.coords.longitude.toFixed(6);
                    canCheckin = true;
                    
                    document.getElementById('latitude').textContent = `纬度: ${currentLatitude}`;
                    document.getElementById('longitude').textContent = `经度: ${currentLongitude}`;
                    document.getElementById('locationCoords').style.display = 'flex';
                    
                    // 解析地址
                    reverseGeocoder(currentLatitude, currentLongitude);
                    
                    // 更新按钮状态
                    document.getElementById('checkinBtn').disabled = false;
                },
                (error) => {
                    console.error('获取位置失败:', error);
                    canCheckin = false;
                    
                    let errorMsg = '获取位置失败：';
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            errorMsg += '用户拒绝了定位请求';
                            break;
                        case error.POSITION_UNAVAILABLE:
                            errorMsg += '位置信息不可用';
                            break;
                        case error.TIMEOUT:
                            errorMsg += '获取位置超时';
                            break;
                        default:
                            errorMsg += '发生未知错误';
                    }
                    
                    document.getElementById('locationAddress').textContent = errorMsg;
                    showToast('请允许定位权限');
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        }

        // 逆地址解析
        async function reverseGeocoder(latitude, longitude) {
            const key = CONFIG.qqMapKey;
            
            if (!key) {
                document.getElementById('locationAddress').textContent = 
                    `纬度: ${parseFloat(latitude).toFixed(6)}, 经度: ${parseFloat(longitude).toFixed(6)}`;
                return;
            }
            
            try {
                const response = await fetch(
                    `https://apis.map.qq.com/ws/geocoder/v1/?location=${latitude},${longitude}&key=${key}&get_poi=1`
                );
                const data = await response.json();
                
                if (data.status === 0) {
                    const address = data.result.address;
                    const recommend = data.result.formatted_addresses;
                    document.getElementById('locationAddress').textContent = 
                        recommend ? recommend.recommend : address;
                } else {
                    throw new Error('解析失败');
                }
            } catch (error) {
                console.error('地址解析失败:', error);
                document.getElementById('locationAddress').textContent = 
                    `纬度: ${parseFloat(latitude).toFixed(6)}, 经度: ${parseFloat(longitude).toFixed(6)}`;
            }
        }

        // 执行打卡
        function doCheckin() {
            if (!canCheckin) {
                showToast('请先获取位置');
                return;
            }

            const now = new Date();
            const remark = document.getElementById('remark').value.trim();
            
            const record = {
                id: Date.now(),
                type: currentCheckinType,
                time: formatTime(now),
                timestamp: now.getTime(),
                latitude: currentLatitude,
                longitude: currentLongitude,
                address: document.getElementById('locationAddress').textContent,
                remark: remark
            };

            // 保存到localStorage
            let records = JSON.parse(localStorage.getItem('checkinRecords') || '[]');
            records.unshift(record); // 新记录添加到开头
            localStorage.setItem('checkinRecords', JSON.stringify(records.slice(0, 50))); // 只保存最近50条

            // 更新页面数据
            document.getElementById('remark').value = '';
            loadRecords();
            
            showToast('打卡成功');
            
            // 振动反馈（如果设备支持）
            if (navigator.vibrate) {
                navigator.vibrate(100);
            }
        }

        // 格式化时间
        function formatTime(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            
            return `${year}-${month}-${day} ${hours}:${minutes}`;
        }

        // 加载打卡记录
        function loadRecords() {
            const records = JSON.parse(localStorage.getItem('checkinRecords') || '[]');
            const recordsList = document.getElementById('recordsList');
            
            if (records.length === 0) {
                recordsList.innerHTML = '<div class="no-records">暂无打卡记录</div>';
            } else {
                let html = '';
                records.forEach(record => {
                    const typeClass = getRecordTypeClass(record.type);
                    html += `
                        <div class="record-item">
                            <div class="record-left">
                                <div class="record-type ${typeClass}">${record.type}</div>
                                <div class="record-info">
                                    <span class="record-time">${record.time}</span>
                                    <span class="record-address">${record.address}</span>
                                    ${record.remark ? `<span class="record-remark">备注: ${record.remark}</span>` : ''}
                                </div>
                            </div>
                            <div class="record-right">
                                <button class="delete-btn" onclick="deleteRecord(${record.id})">×</button>
                            </div>
                        </div>
                    `;
                });
                recordsList.innerHTML = html;
            }
            
            calculateStats();
        }

        // 获取记录类型样式类
        function getRecordTypeClass(type) {
            switch(type) {
                case '上班': return 'type-work';
                case '下班': return 'type-off';
                case '外出': return 'type-out';
                case '返回': return 'type-back';
                default: return 'type-work';
            }
        }

        // 计算统计数据
        function calculateStats() {
            const records = JSON.parse(localStorage.getItem('checkinRecords') || '[]');
            const now = new Date();
            
            // 今日记录数
            const todayStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
            const todayCount = records.filter(r => r.time.startsWith(todayStr)).length;
            
            // 本周记录数
            const weekStart = new Date(now);
            weekStart.setDate(now.getDate() - now.getDay());
            weekStart.setHours(0, 0, 0, 0);
            const weekCount = records.filter(r => r.timestamp >= weekStart.getTime()).length;
            
            document.getElementById('todayCount').textContent = todayCount;
            document.getElementById('weekCount').textContent = weekCount;
        }

        // 删除单条记录
        function deleteRecord(id) {
            showModal('确认删除', '确定要删除这条打卡记录吗？', () => {
                let records = JSON.parse(localStorage.getItem('checkinRecords') || '[]');
                records = records.filter(r => r.id !== id);
                localStorage.setItem('checkinRecords', JSON.stringify(records));
                
                loadRecords();
                showToast('已删除');
            });
        }

        // 清空所有记录
        function clearRecords() {
            showModal('确认清空', '确定要清空所有打卡记录吗？此操作不可恢复。', () => {
                localStorage.setItem('checkinRecords', JSON.stringify([]));
                loadRecords();
                showToast('已清空');
            }, true);
        }

        // 导出记录
        function exportRecords() {
            const records = JSON.parse(localStorage.getItem('checkinRecords') || '[]');
            
            if (records.length === 0) {
                showToast('暂无记录可导出');
                return;
            }

            // 生成CSV内容
            let csv = '打卡类型,时间,地址,备注,纬度,经度\n';
            records.forEach(r => {
                csv += `${r.type},${r.time},"${r.address}",${r.remark || ''},${r.latitude},${r.longitude}\n`;
            });

            // 创建下载链接
            const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `打卡记录_${formatTime(new Date()).replace(/[: ]/g, '_')}.csv`;
            link.click();
            URL.revokeObjectURL(url);
            
            showToast('导出成功');
        }

        // 显示Toast提示
        function showToast(message) {
            const existingToast = document.querySelector('.toast');
            if (existingToast) {
                existingToast.remove();
            }

            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 2000);
        }

        // 显示模态框
        function showModal(title, text, callback, isDanger = false) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalText').textContent = text;
            
            const confirmBtn = document.getElementById('modalConfirmBtn');
            confirmBtn.className = isDanger ? 'modal-btn danger' : 'modal-btn confirm';
            
            modalCallback = callback;
            document.getElementById('modal').classList.add('show');
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('modal').classList.remove('show');
            modalCallback = null;
        }

        // 确认模态框
        function confirmModal() {
            if (modalCallback) {
                modalCallback();
            }
            closeModal();
        }

        // 点击模态框外部关闭
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>
</body>
</html>
